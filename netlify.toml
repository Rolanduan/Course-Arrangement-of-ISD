[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  # 将 node_modules 包含在 Functions 中
  included_files = ["node_modules/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 5173
  publish = "dist"

# 环境变量（部署时在 Netlify 后台配置）
# [context.production.environment]
#   DB_TYPE = "postgresql"
#   DATABASE_URL = "your_connection_string"
